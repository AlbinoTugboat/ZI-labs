version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: information-protection-postgres
    environment:
      POSTGRES_DB: information_protection_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - information_protection_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: information-protection-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - information_protection_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: information-protection-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} >/dev/null 2>&1; do sleep 1; done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      if ! mc admin user info local ${MINIO_ACCESS_KEY} >/dev/null 2>&1; then
        mc admin user add local ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      fi;
      mc admin policy attach local readwrite --user ${MINIO_ACCESS_KEY};
      "
    restart: "no"

volumes:
  information_protection_postgres_data:
  information_protection_minio_data:
