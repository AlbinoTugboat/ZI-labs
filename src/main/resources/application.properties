spring.application.name=zaschita-informatsii
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5433/information_protection_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=86400000

signature.key-store-path=${SIGNATURE_KEY_STORE_PATH:classpath:ssl/server.p12}
signature.key-store-type=${SIGNATURE_KEY_STORE_TYPE:PKCS12}
signature.key-store-password=${SIGNATURE_KEY_STORE_PASSWORD:${SSL_KEYSTORE_PASSWORD:}}
signature.key-alias=${SIGNATURE_KEY_ALIAS:}
signature.key-password=${SIGNATURE_KEY_PASSWORD:${SIGNATURE_KEY_STORE_PASSWORD:${SSL_KEYSTORE_PASSWORD:}}}
signature.algorithm=${SIGNATURE_ALGORITHM:SHA256withRSA}
signature.fail-fast=${SIGNATURE_FAIL_FAST:true}

storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:}
storage.minio.secret-key=${MINIO_SECRET_KEY:}
storage.minio.bucket=${MINIO_BUCKET:signature-files}
storage.minio.presigned-ttl-seconds=${MINIO_PRESIGNED_TTL_SECONDS:900}

server.port=8444
server.http.port=8081
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:ssl/server.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
server.ssl.enabled=true
