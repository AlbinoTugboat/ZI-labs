server.ssl.enabled=false

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.javax.persistence.validation.mode=none
spring.jpa.open-in-view=false

jwt.secret=test-jwt-secret-at-least-32-characters-long
signature.fail-fast=false
storage.minio.endpoint=http://localhost:9000
storage.minio.access-key=test-access
storage.minio.secret-key=test-secret
storage.minio.bucket=test-signatures
storage.minio.presigned-ttl-seconds=300

